<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abiquiu Community Archive</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#1f4e79;
    color:white;
    padding:20px;
    text-align:center;
}

main{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:8px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.card a{
    text-decoration:none;
    font-size:20px;
    color:#1f4e79;
    font-weight:bold;
}

footer{
    margin-top:30px;
    text-align:center;
    color:#666;
}
</style>

</head>

<body>

<header>

<h1>Abiquiu Community Archive</h1>

<h3>Community History • Families • Land • Culture</h3>

</header>

<main>

<div class="grid">

<div class="card"><a href="#">📷 Photos</a></div>

<div class="card"><a href="#">📄 Documents</a></div>

<a href="http://localhost:8081">👨 Persons Database</a>

<div class="card"><a href="#">🎙 Oral Histories</a></div>

<div class="card"><a href="#">🗺 Maps & GIS</a></div>

<div class="card"><a href="#">💧 Acequias</a></div>

<div class="card"><a href="#">📜 Land Grants</a></div>

<div class="card"><a href="#">⚰ Cemeteries</a></div>

<div class="card"><a href="http://localhost:8081">🗄 Database</a></div>

<a href="http://localhost:8083">📁 File Repository</a>

</div>

<footer>

Community Archive Demonstration

</footer>

</main>

</body>
</html>
