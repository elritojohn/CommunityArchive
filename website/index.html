<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abiquiu Community Archive</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f5;
}

header{
    background:#1f4e79;
    color:white;
    padding:25px;
    text-align:center;
}

header h1{
    margin:0;
}

main{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:25px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card a{
    text-decoration:none;
    color:#1f4e79;
    font-size:22px;
    font-weight:bold;
}

.card:hover{
    background:#dbe8f5;
}

footer{
    margin-top:40px;
    text-align:center;
    color:#666;
}
</style>

</head>

<body>

<header>
<h1>Abiquiu Community Archive</h1>
<p>Community History • Families • Culture • Maps</p>
</header>

<main>

<div class="grid">

<div class="card">
<a href="#">📷<br>Photos</a>
</div>

<div class="card">
<a href="#">📄<br>Documents</a>
</div>

<div class="card">
<a href="#">👨‍👩‍👧<br>Families</a>
</div>

<div class="card">
<a href="#">🎙<br>Oral Histories</a>
</div>

<div class="card">
<a href="#">🗺<br>Maps & GIS</a>
</div>

<div class="card">
<a href="#">💧<br>Acequias</a>
</div>

<div class="card">
<a href="#">📜<br>Land Grants</a>
</div>

<div class="card">
<a href="#">⚰<br>Cemeteries</a>
</div>

<div class="card">
<a href="http://localhost:8081">🗄<br>Database</a>
</div>

<div class="card">
<a href="http://localhost:8083">📁<br>File Browser</a>
</div>

</div>

<footer>

Community Archive Demonstration Platform<br>
Docker • PostgreSQL • NocoDB • QGIS

</footer>

</main>

</body>
</html>
